<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语脉 ThreadTrace</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>语脉</h1>
          <p>ThreadTrace</p>
        </div>
      </div>
      <nav class="nav-list" aria-label="主导航">
        <button class="nav-item active" data-view="history">历史分析</button>
        <button class="nav-item" data-view="context">新发言解读</button>
        <button class="nav-item" data-view="search">历史检索</button>
        <button class="nav-item" data-view="system">系统状态</button>
      </nav>
    </aside>

    <main class="workspace">
      <section class="toolbar">
        <div>
          <h2 id="viewTitle">历史分析</h2>
          <p id="viewSubtitle">解析保存页目录，生成作者、实体、观点和证据概览。</p>
        </div>
        <button id="refreshAdaptersButton" class="icon-button" type="button" title="刷新适配器">↻</button>
      </section>

      <section class="view-panel" id="historyView">
        <form id="analyzeForm" class="control-strip">
          <label>
            <span>论坛</span>
            <select name="forum" id="historyForum"></select>
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">分析目录</button>
          <button id="enrichHistoryButton" class="secondary-button" type="button">语义增强</button>
          <button id="refreshAuthorIntelligenceButton" class="secondary-button" type="button">作者情报</button>
        </form>
        <div id="authorIntelligenceResult" class="result-grid"></div>
        <div id="historyResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="contextView">
        <form id="contextForm" class="stacked-form">
          <div class="control-strip">
            <label>
              <span>论坛</span>
              <select name="forum" id="contextForum"></select>
            </label>
            <label class="grow">
              <span>保存页目录</span>
              <input name="inputDir" value="example" autocomplete="off">
            </label>
          </div>
          <div class="control-strip">
            <label>
              <span>作者 ID</span>
              <input name="authorId" value="150058" autocomplete="off">
            </label>
            <label>
              <span>作者</span>
              <input name="author" value="-阿狼-" autocomplete="off">
            </label>
          </div>
          <label class="full">
            <span>新发言</span>
            <textarea name="text" rows="4">科技后面看量确认</textarea>
          </label>
          <button type="submit">还原语境</button>
        </form>
        <div id="contextResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="searchView">
        <form id="indexForm" class="control-strip">
          <label>
            <span>论坛</span>
            <select name="forum" id="searchForum"></select>
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">更新索引</button>
        </form>
        <form id="searchForm" class="control-strip">
          <label class="grow">
            <span>检索问题</span>
            <input name="text" value="科技" autocomplete="off">
          </label>
          <label class="compact">
            <span>结果数</span>
            <input name="limit" value="8" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">搜索证据</button>
        </form>
        <div id="searchResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="systemView">
        <form id="taskForm" class="control-strip">
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">运行导入任务</button>
          <button id="refreshTasksButton" class="secondary-button" type="button">刷新任务</button>
        </form>
        <form id="sourceForm" class="control-strip">
          <label>
            <span>论坛</span>
            <select name="forum" id="sourceForum"></select>
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA sample archive" autocomplete="off">
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存来源</button>
          <button id="refreshSourcesButton" class="secondary-button" type="button">刷新来源</button>
          <button id="refreshSourceOperationsButton" class="secondary-button" type="button">Source ops</button>
          <button id="runSourcesButton" class="secondary-button" type="button">运行全部</button>
          <button id="runDueSourcesButton" class="secondary-button" type="button">运行到期</button>
          <button id="runDuePipelinesButton" class="secondary-button" type="button">洞察到期</button>
          <button id="refreshEventsButton" class="secondary-button" type="button">刷新事件</button>
          <button id="dispatchEventsButton" class="secondary-button" type="button">投递事件</button>
        </form>
        <form id="threadUrlForm" class="control-strip">
          <label>
            <span>论坛</span>
            <select name="forum" id="threadUrlForum"></select>
          </label>
          <label class="grow">
            <span>在线主题 URL</span>
            <input name="url" placeholder="https://bbs.nga.cn/read.php?tid=..." autocomplete="off">
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA online thread" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存 URL 来源</button>
          <button id="crawlUrlButton" class="secondary-button" type="button">抓取页面</button>
          <button id="refreshRawPagesButton" class="secondary-button" type="button">刷新原始页</button>
        </form>
        <form id="sourceOnboardingForm" class="control-strip">
          <label>
            <span>接入论坛</span>
            <select name="forum" id="onboardingForum"></select>
          </label>
          <label>
            <span>来源类型</span>
            <select name="sourceType">
              <option value="saved-html-directory">saved-html-directory</option>
              <option value="thread-url">thread-url</option>
              <option value="normalized-thread-json">normalized-thread-json</option>
            </select>
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="Onboarding source" autocomplete="off">
          </label>
          <label class="grow">
            <span>可选模块路径</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <label class="grow">
            <span>本地目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON 文件 / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">接入预检</button>
        </form>
        <div class="status-list" id="systemStatus"></div>
        <div class="result-grid task-grid" id="sourceOperationsResult"></div>
        <div class="result-grid task-grid" id="sourceOperationActionResult"></div>
        <div class="result-grid task-grid" id="runbookResult"></div>
        <form id="eventFilterForm" class="control-strip">
          <label class="compact">
            <span>事件范围</span>
            <select name="acknowledged">
              <option value="false">未确认</option>
              <option value="">全部</option>
              <option value="true">已确认</option>
            </select>
          </label>
          <label class="compact">
            <span>投递状态</span>
            <select name="deliveryStatus">
              <option value="">全部</option>
              <option value="pending">pending</option>
              <option value="failed">failed</option>
              <option value="delivered">delivered</option>
              <option value="resolved">resolved</option>
            </select>
          </label>
          <label class="compact">
            <span>事件类型</span>
            <select name="type">
              <option value="">全部</option>
              <option value="author-review-queue">author-review-queue</option>
              <option value="context-review-result">context-review-result</option>
              <option value="runbook-action">runbook-action</option>
              <option value="source-changed">source-changed</option>
            </select>
          </label>
          <label class="compact">
            <span>数量</span>
            <input name="limit" value="10" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">筛选事件</button>
        </form>
        <form id="contextReviewResultForm" class="control-strip">
          <label class="full">
            <span>Context review result JSON</span>
            <textarea name="resultJson" rows="10" spellcheck="false">{
  "version": "1.0.0",
  "handoffVersion": "1.0.0",
  "handoffId": "context-review-web-sample",
  "status": "partially-accepted",
  "reviewer": {
    "type": "human",
    "id": "web-operator",
    "displayName": "Web operator"
  },
  "reviewedAt": "2026-06-21T10:00:00.000Z",
  "decisions": [
    {
      "taskId": "web-review-task-1",
      "decision": "confirmed",
      "confidence": 0.82,
      "evidenceRefs": []
    },
    {
      "taskId": "web-review-task-2",
      "decision": "needs-more-evidence",
      "confidence": 0.52,
      "evidenceRefs": []
    }
  ],
  "resolvedTasks": ["web-review-task-1"],
  "remainingTasks": ["web-review-task-2"],
  "confidence": 0.7,
  "evidenceRefs": []
}</textarea>
          </label>
          <button type="submit">Store review result</button>
          <button id="refreshReviewResultsButton" class="secondary-button" type="button">Review overview</button>
          <button id="refreshReviewActionPlanButton" class="secondary-button" type="button">Review action plan</button>
          <button id="refreshReviewActionGateButton" class="secondary-button" type="button">Review gate</button>
          <button id="runReviewActionApplyButton" class="secondary-button" type="button">Dry-run review apply</button>
          <button id="refreshReviewActionAuditsButton" class="secondary-button" type="button">Review action audits</button>
          <button id="refreshReviewActionExecutionsButton" class="secondary-button" type="button">Review action executions</button>
          <button id="refreshReviewActionExecutorDiagnosticsButton" class="secondary-button" type="button">Review executor diagnostics</button>
          <button id="synthesizeReviewResultEventsButton" class="secondary-button" type="button">Create review alerts</button>
        </form>
        <form id="connectorModuleValidationForm" class="control-strip">
          <label class="grow">
            <span>Connector 模块路径</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <button type="submit">验证模块</button>
        </form>
        <form id="sourceDryRunForm" class="control-strip">
          <label>
            <span>Dry-run forum</span>
            <select name="forum" id="dryRunForum"></select>
          </label>
          <label>
            <span>Source type</span>
            <select name="sourceType">
              <option value="saved-html-directory">saved-html-directory</option>
              <option value="thread-url">thread-url</option>
              <option value="normalized-thread-json">normalized-thread-json</option>
            </select>
          </label>
          <label class="grow">
            <span>Name</span>
            <input name="displayName" value="Dry-run source" autocomplete="off">
          </label>
          <label class="grow">
            <span>Module path</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <label class="grow">
            <span>Input dir</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON file / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">Source dry-run</button>
        </form>
        <form id="connectorRolloutForm" class="control-strip">
          <label>
            <span>Rollout forum</span>
            <select name="forum" id="rolloutForum"></select>
          </label>
          <label>
            <span>Source type</span>
            <select name="sourceType">
              <option value="saved-html-directory">saved-html-directory</option>
              <option value="thread-url">thread-url</option>
              <option value="normalized-thread-json">normalized-thread-json</option>
            </select>
          </label>
          <label class="grow">
            <span>Name</span>
            <input name="displayName" value="Rollout source" autocomplete="off">
          </label>
          <label class="grow">
            <span>Module path</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <label class="grow">
            <span>Input dir</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON file / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="compact">
            <span>Dry-run</span>
            <select name="dryRunIngest">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">Rollout plan</button>
        </form>
        <form id="workerTopologyForm" class="control-strip">
          <label>
            <span>Topology</span>
            <select name="topology">
              <option value="operations-worker">operations-worker</option>
              <option value="split-workers">split-workers</option>
            </select>
          </label>
          <label>
            <span>Source mode</span>
            <select name="sourceTaskMode">
              <option value="ingest">ingest</option>
              <option value="insight-pipeline">insight-pipeline</option>
            </select>
          </label>
          <button type="submit">Worker plan</button>
        </form>
        <form id="rolloutManifestForm" class="control-strip">
          <label class="full">
            <span>Rollout manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <button type="submit">Manifest plan</button>
        </form>
        <form id="resourceProvisioningForm" class="control-strip">
          <label class="full">
            <span>Resource manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <button type="submit">Resource plan</button>
        </form>
        <form id="deploymentGateForm" class="control-strip">
          <label class="full">
            <span>Deployment gate manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <button type="submit">Deployment gate</button>
        </form>
        <form id="rolloutApplyForm" class="control-strip">
          <label class="full">
            <span>Apply manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <label class="compact">
            <span>Execute</span>
            <select name="execute">
              <option value="false">false</option>
              <option value="true">true</option>
            </select>
          </label>
          <button type="submit">Apply manifest</button>
        </form>
        <div class="result-grid task-grid" id="onboardingResult"></div>
        <div class="result-grid task-grid" id="connectorModuleResult"></div>
        <div class="result-grid task-grid" id="sourceDryRunResult"></div>
        <div class="result-grid task-grid" id="connectorRolloutResult"></div>
        <div class="result-grid task-grid" id="workerTopologyResult"></div>
        <div class="result-grid task-grid" id="rolloutManifestResult"></div>
        <div class="result-grid task-grid" id="resourceProvisioningResult"></div>
        <div class="result-grid task-grid" id="deploymentGateResult"></div>
        <div class="result-grid task-grid" id="rolloutApplyResult"></div>
        <div class="result-grid task-grid" id="sourceResult"></div>
        <div class="result-grid task-grid" id="rawPageResult"></div>
        <div class="result-grid task-grid" id="eventResult"></div>
        <div class="result-grid task-grid" id="contextReviewResultOverview"></div>
        <div class="result-grid task-grid" id="contextReviewResultResult"></div>
        <div class="result-grid task-grid" id="taskResult"></div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
