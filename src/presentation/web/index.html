<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语脉 ThreadTrace</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>语脉</h1>
          <p>ThreadTrace</p>
        </div>
      </div>
      <nav class="nav-list" aria-label="主导航">
        <button class="nav-item active" data-view="history">历史分析</button>
        <button class="nav-item" data-view="context">新发言解读</button>
        <button class="nav-item" data-view="search">历史检索</button>
        <button class="nav-item" data-view="system">系统状态</button>
      </nav>
    </aside>

    <main class="workspace">
      <section class="toolbar">
        <div>
          <h2 id="viewTitle">历史分析</h2>
          <p id="viewSubtitle">解析保存页目录，生成作者、实体、观点和证据概览。</p>
        </div>
        <button id="refreshAdaptersButton" class="icon-button" type="button" title="刷新适配器">↻</button>
      </section>

      <section class="view-panel" id="historyView">
        <div id="historyCockpit" class="cockpit-grid"></div>
        <form id="analyzeForm" class="control-strip entry-card history-entry-card" data-title="Evidence intake">
          <label>
            <span>论坛</span>
            <select name="forum" id="historyForum"></select>
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">分析目录</button>
          <button id="enrichHistoryButton" class="secondary-button" type="button">语义增强</button>
          <button id="refreshAuthorIntelligenceButton" class="secondary-button" type="button">作者情报</button>
        </form>
        <div id="authorIntelligenceResult" class="result-grid"></div>
        <div id="historyResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="contextView">
        <form id="contextForm" class="stacked-form entry-card context-entry-card" data-title="Context restore">
          <div class="control-strip">
            <label>
              <span>论坛</span>
              <select name="forum" id="contextForum"></select>
            </label>
            <label class="grow">
              <span>保存页目录</span>
              <input name="inputDir" value="example" autocomplete="off">
            </label>
          </div>
          <div class="control-strip">
            <label>
              <span>作者 ID</span>
              <input name="authorId" value="150058" autocomplete="off">
            </label>
            <label>
              <span>作者</span>
              <input name="author" value="-阿狼-" autocomplete="off">
            </label>
          </div>
          <label class="full">
            <span>新发言</span>
            <textarea name="text" rows="4">科技后面看量确认</textarea>
          </label>
          <button type="submit">还原语境</button>
        </form>
        <div id="contextResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="searchView">
        <div class="search-workbench">
        <form id="indexForm" class="control-strip entry-card search-index-card" data-title="Index refresh">
          <label>
            <span>论坛</span>
            <select name="forum" id="searchForum"></select>
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">更新索引</button>
        </form>
        <form id="searchForm" class="control-strip entry-card search-query-card" data-title="Evidence search">
          <label class="grow">
            <span>检索问题</span>
            <input name="text" value="科技" autocomplete="off">
          </label>
          <label class="compact">
            <span>结果数</span>
            <input name="limit" value="8" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">搜索证据</button>
        </form>
        </div>
        <div id="searchResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="systemView">
        <div class="system-overview">
          <div class="system-overview-copy">
            <span>System workbench</span>
            <h3>运行、接入、事件和发布都在这里收口。</h3>
            <p>先看运行体征，再进入来源采集、事件处理、审查动作和部署门禁。</p>
          </div>
          <nav class="system-rail" aria-label="System sections">
            <a href="#system-collection">来源采集</a>
            <a href="#system-operations">运行体征</a>
            <a href="#system-events">事件审查</a>
            <a href="#system-rollout">发布资源</a>
          </nav>
        </div>
        <div class="status-list system-status-grid" id="systemStatus"></div>
        <div class="system-zone-title" id="system-collection">
          <span>Collection</span>
          <strong>来源采集与接入</strong>
        </div>
        <div class="collection-workflow">
        <form id="taskForm" class="control-strip collection-card collection-card-archive" data-title="Archive ingest">
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">运行导入任务</button>
          <button id="refreshTasksButton" class="secondary-button" type="button">刷新任务</button>
        </form>
        <form id="sourceForm" class="control-strip collection-card collection-card-source" data-title="Tracked source">
          <label>
            <span>论坛</span>
            <select name="forum" id="sourceForum"></select>
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA sample archive" autocomplete="off">
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存来源</button>
          <div class="source-command-shelf" aria-label="Source commands">
            <div class="source-command-group" data-label="Source">
              <button id="refreshSourcesButton" class="secondary-button" type="button">刷新来源</button>
              <button id="refreshSourceOperationsButton" class="secondary-button" type="button">Source ops</button>
              <button id="runDemoCycleButton" class="secondary-button" type="button">Demo cycle</button>
            </div>
            <div class="source-command-group" data-label="Automation">
              <button id="refreshAutomationReadinessButton" class="secondary-button" type="button">Automation readiness</button>
              <button id="runSourcesButton" class="secondary-button" type="button">运行全部</button>
              <button id="runDueSourcesButton" class="secondary-button" type="button">运行到期</button>
              <button id="runDuePipelinesButton" class="secondary-button" type="button">洞察到期</button>
            </div>
            <div class="source-command-group" data-label="LLM">
              <button id="runLlmReadinessButton" class="secondary-button" type="button">LLM readiness</button>
              <button id="runLlmPreflightButton" class="secondary-button" type="button">LLM preflight</button>
              <button id="runLlmEvaluationButton" class="secondary-button" type="button">LLM evaluate</button>
            </div>
            <div class="source-command-group" data-label="Events">
              <button id="refreshEventsButton" class="secondary-button" type="button">刷新事件</button>
              <button id="dispatchEventsButton" class="secondary-button" type="button">投递事件</button>
            </div>
          </div>
        </form>
        <form id="threadUrlForm" class="control-strip collection-card collection-card-url" data-title="Thread URL">
          <label>
            <span>论坛</span>
            <select name="forum" id="threadUrlForum"></select>
          </label>
          <label class="grow">
            <span>在线主题 URL</span>
            <input name="url" placeholder="https://bbs.nga.cn/read.php?tid=..." autocomplete="off">
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA online thread" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <label class="compact">
            <span>Start page</span>
            <input name="startPage" value="1" inputmode="numeric" autocomplete="off">
          </label>
          <label class="compact">
            <span>Pages</span>
            <input name="pageCount" value="1" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存 URL 来源</button>
          <button id="crawlUrlButton" class="secondary-button" type="button">抓取页面</button>
          <button id="refreshRawPagesButton" class="secondary-button" type="button">刷新原始页</button>
        </form>
        <form id="sourceOnboardingForm" class="control-strip collection-card collection-card-onboarding" data-title="Connector preflight">
          <label>
            <span>接入论坛</span>
            <input name="forum" id="onboardingForum" list="forumSuggestions" value="nga" autocomplete="off">
          </label>
          <label>
            <span>来源类型</span>
            <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="Onboarding source" autocomplete="off">
          </label>
          <label class="grow">
            <span>可选模块路径</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <button id="loadConnectorModuleCatalogButton" class="secondary-button" type="button">Load module catalog</button>
          <label class="grow">
            <span>本地目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON 文件 / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">接入预检</button>
        </form>
        </div>
        <div class="result-grid task-grid" id="sourceOnboardingRecipe"></div>
        <div class="system-zone-title" id="system-operations">
          <span>Operations</span>
          <strong>运行队列、worker 和 runbook</strong>
        </div>
        <div class="result-grid task-grid system-runbook-grid" id="runbookResult"></div>
        <div class="result-grid task-grid" id="sourceOperationsResult"></div>
        <div class="result-grid task-grid" id="sourceOperationActionResult"></div>
        <div class="system-zone-title" id="system-events">
          <span>Events</span>
          <strong>通知事件与人工审查</strong>
        </div>
        <div class="event-review-workflow">
        <form id="eventFilterForm" class="control-strip event-card event-card-filter" data-title="Event triage">
          <label class="compact">
            <span>事件范围</span>
            <select name="acknowledged">
              <option value="false">未确认</option>
              <option value="">全部</option>
              <option value="true">已确认</option>
            </select>
          </label>
          <label class="compact">
            <span>投递状态</span>
            <select name="deliveryStatus">
              <option value="">全部</option>
              <option value="pending">pending</option>
              <option value="failed">failed</option>
              <option value="delivered">delivered</option>
              <option value="resolved">resolved</option>
            </select>
          </label>
          <label class="compact">
            <span>事件类型</span>
            <select name="type">
              <option value="">全部</option>
              <option value="author-review-queue">author-review-queue</option>
              <option value="context-review-result">context-review-result</option>
              <option value="runbook-action">runbook-action</option>
              <option value="source-attention">source-attention</option>
              <option value="source-type-operations">source-type-operations</option>
              <option value="source-changed">source-changed</option>
            </select>
          </label>
          <label class="compact">
            <span>Source key</span>
            <input name="sourceKey" placeholder="nga" autocomplete="off">
          </label>
          <label class="compact">
            <span>Source ID</span>
            <input name="sourceId" placeholder="source-1" autocomplete="off">
          </label>
          <label class="compact">
            <span>数量</span>
            <input name="limit" value="10" inputmode="numeric" autocomplete="off">
          </label>
          <button type="button" class="secondary-button" id="previewAckEventsButton">Preview ack</button>
          <button type="button" class="secondary-button" id="ackVisibleEventsButton">Ack execute</button>
          <button type="button" class="secondary-button" id="previewEventArchiveButton">Archive check</button>
          <button type="button" class="secondary-button" id="archiveEventsButton">Archive handled</button>
          <button type="submit">筛选事件</button>
        </form>
        <form id="contextReviewResultForm" class="control-strip event-card event-card-review" data-title="Human decision">
          <label class="full">
            <span>Context review result JSON</span>
            <textarea name="resultJson" rows="10" spellcheck="false">{
  "version": "1.0.0",
  "handoffVersion": "1.0.0",
  "handoffId": "context-review-web-sample",
  "status": "partially-accepted",
  "reviewer": {
    "type": "human",
    "id": "web-operator",
    "displayName": "Web operator"
  },
  "reviewedAt": "2026-06-21T10:00:00.000Z",
  "decisions": [
    {
      "taskId": "web-review-task-1",
      "decision": "confirmed",
      "confidence": 0.82,
      "evidenceRefs": []
    },
    {
      "taskId": "web-review-task-2",
      "decision": "needs-more-evidence",
      "confidence": 0.52,
      "evidenceRefs": []
    }
  ],
  "resolvedTasks": ["web-review-task-1"],
  "remainingTasks": ["web-review-task-2"],
  "confidence": 0.7,
  "evidenceRefs": []
}</textarea>
          </label>
          <div class="review-command-shelf" aria-label="Review commands">
            <div class="review-command-group review-command-primary" data-label="Decision">
              <button type="submit">Store review result</button>
              <button id="refreshReviewResultsButton" class="secondary-button" type="button">Review overview</button>
            </div>
            <div class="review-command-group" data-label="Plan">
              <button id="refreshReviewActionPlanButton" class="secondary-button" type="button">Review action plan</button>
              <button id="refreshReviewActionGateButton" class="secondary-button" type="button">Review gate</button>
              <button id="runReviewActionApplyButton" class="secondary-button" type="button">Dry-run review apply</button>
            </div>
            <div class="review-command-group" data-label="Audit">
              <button id="refreshReviewActionAuditsButton" class="secondary-button" type="button">Review action audits</button>
              <button id="refreshReviewActionExecutionsButton" class="secondary-button" type="button">Review action executions</button>
              <button id="refreshReviewActionExecutorDiagnosticsButton" class="secondary-button" type="button">Review executor diagnostics</button>
            </div>
            <div class="review-command-group" data-label="Alerts">
              <button id="synthesizeReviewResultEventsButton" class="secondary-button" type="button">Review alert check</button>
              <button id="createReviewResultEventsButton" class="secondary-button" type="button">Create review alerts</button>
            </div>
          </div>
        </form>
        </div>
        <div class="system-zone-title" id="system-rollout">
          <span>Rollout</span>
          <strong>连接器、资源和部署门禁</strong>
        </div>
        <div class="rollout-workbench">
        <form id="connectorModuleValidationForm" class="control-strip rollout-card rollout-card-module" data-title="Module scan">
          <label class="grow">
            <span>Connector 模块路径</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <button type="submit">验证模块</button>
        </form>
        <form id="sourceDryRunForm" class="control-strip rollout-card rollout-card-dryrun" data-title="Source rehearsal">
          <label>
            <span>Dry-run forum</span>
            <input name="forum" id="dryRunForum" list="forumSuggestions" value="nga" autocomplete="off">
          </label>
          <label>
            <span>Source type</span>
            <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
          </label>
          <label class="grow">
            <span>Name</span>
            <input name="displayName" value="Dry-run source" autocomplete="off">
          </label>
          <label class="grow">
            <span>Module path</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <label class="grow">
            <span>Input dir</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON file / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">Source dry-run</button>
        </form>
        <form id="connectorRolloutForm" class="control-strip rollout-card rollout-card-plan" data-title="Rollout graph">
          <label>
            <span>Rollout forum</span>
            <input name="forum" id="rolloutForum" list="forumSuggestions" value="nga" autocomplete="off">
          </label>
          <label>
            <span>Source type</span>
            <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
          </label>
          <label class="grow">
            <span>Name</span>
            <input name="displayName" value="Rollout source" autocomplete="off">
          </label>
          <label class="grow">
            <span>Module path</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <label class="grow">
            <span>Input dir</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON file / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="compact">
            <span>Dry-run</span>
            <select name="dryRunIngest">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
          <label class="full">
            <span>Location JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">Rollout plan</button>
        </form>
        <form id="workerTopologyForm" class="control-strip rollout-card rollout-card-worker" data-title="Worker topology">
          <label>
            <span>Topology</span>
            <select name="topology">
              <option value="operations-worker">operations-worker</option>
              <option value="split-workers">split-workers</option>
            </select>
          </label>
          <label>
            <span>Source mode</span>
            <select name="sourceTaskMode">
              <option value="ingest">ingest</option>
              <option value="insight-pipeline">insight-pipeline</option>
            </select>
          </label>
          <label>
            <span>Source key</span>
            <input name="sourceKey" value="nga" autocomplete="off">
          </label>
          <label>
            <span>Source ID</span>
            <input name="sourceId" placeholder="optional tracked source id" autocomplete="off">
          </label>
          <button type="submit">Worker plan</button>
        </form>
        <form id="rolloutManifestForm" class="control-strip rollout-card rollout-card-manifest" data-title="Manifest plan">
          <label class="full">
            <span>Rollout manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <button type="submit">Manifest plan</button>
        </form>
        <form id="resourceProvisioningForm" class="control-strip rollout-card rollout-card-resource" data-title="Resource map">
          <label class="full">
            <span>Resource manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <button type="submit">Resource plan</button>
        </form>
        <form id="deploymentGateForm" class="control-strip rollout-card rollout-card-gate" data-title="Deployment gate">
          <label class="full">
            <span>Deployment gate manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <label class="compact">
            <span>LLM mode</span>
            <select name="llmReadinessMode">
              <option value="configuration">configuration</option>
              <option value="preflight">preflight</option>
              <option value="evaluation">evaluation</option>
            </select>
          </label>
          <label class="compact">
            <span>LLM provider</span>
            <select name="provider">
              <option value="mock">mock</option>
              <option value="openai-compatible">openai-compatible</option>
            </select>
          </label>
          <button type="submit">Deployment gate</button>
          <button id="runRolloutReadinessButton" class="secondary-button" type="button">Run rollout checks</button>
        </form>
        <form id="rolloutApplyForm" class="control-strip rollout-card rollout-card-apply" data-title="Apply audit">
          <label class="full">
            <span>Apply manifest JSON</span>
            <textarea name="manifestJson" rows="9" spellcheck="false">{
  "version": "1.0",
  "name": "nga-sample-rollout",
  "source": {
    "sourceKey": "nga",
    "sourceType": "saved-html-directory",
    "displayName": "NGA sample archive",
    "inputDir": "example"
  },
  "ingest": {
    "dryRun": true
  },
  "workers": {
    "topology": "operations-worker",
    "sourceTaskMode": "ingest"
  }
}</textarea>
          </label>
          <label class="compact">
            <span>Execute</span>
            <select name="execute">
              <option value="false">false</option>
              <option value="true">true</option>
            </select>
          </label>
          <button type="submit">Apply manifest</button>
        </form>
        </div>
        <div class="result-grid task-grid" id="onboardingResult"></div>
        <div class="result-grid task-grid" id="connectorModuleResult"></div>
        <div class="result-grid task-grid" id="sourceDryRunResult"></div>
        <div class="result-grid task-grid" id="connectorRolloutResult"></div>
