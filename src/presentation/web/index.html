<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>语脉 ThreadTrace</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">语</div>
        <div>
          <h1>语脉</h1>
          <p>ThreadTrace</p>
        </div>
      </div>
      <nav class="nav-groups" aria-label="主导航">
        <div class="nav-group">
          <div class="nav-group-title">工作区</div>
          <div class="nav-list">
            <button class="nav-item active" data-view="overview">概览</button>
            <button class="nav-item" data-view="history">历史分析</button>
            <button class="nav-item" data-view="context">新发言解读</button>
            <button class="nav-item" data-view="search">历史检索</button>
          </div>
        </div>
        <div class="nav-group">
          <div class="nav-group-title">运营</div>
          <div class="nav-list">
            <button class="nav-item" data-view="sources">来源</button>
            <button class="nav-item" data-view="operations">运行</button>
            <button class="nav-item" data-view="alerts">提醒</button>
            <button class="nav-item" data-view="publish">发布</button>
          </div>
        </div>
      </nav>
      <div class="sidebar-status" aria-label="工作台状态">
        <span>私人工作区</span>
        <strong>证据优先</strong>
        <small>本地资料 · 智能复核 · 来源就绪</small>
      </div>
    </aside>

    <main class="workspace">
      <section class="toolbar">
        <div class="toolbar-copy">
          <div class="toolbar-meta" aria-label="当前工作模式">
            <span id="viewMode">概览</span>
            <span id="viewFocus">今日要处理</span>
          </div>
          <h2 id="viewTitle">概览</h2>
          <p id="viewSubtitle">今天需要处理的来源、提醒和复核都收在这里。</p>
        </div>
        <div class="toolbar-actions">
          <span class="toolbar-runtime">本地运行</span>
          <button id="refreshAdaptersButton" class="icon-button" type="button" title="刷新适配器" aria-label="刷新适配器">↻</button>
        </div>
      </section>

      <section class="view-panel" id="overviewView">
        <div id="overviewResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="historyView">
        <div id="historyCockpit" class="cockpit-grid"></div>
        <form id="analyzeForm" class="control-strip entry-card history-entry-card" data-title="资料入口">
          <div class="history-source-strip">
            <span>来源</span>
            <label>
              <span>论坛</span>
              <select name="forum" id="historyForum"></select>
            </label>
          </div>
          <label class="grow history-directory-field">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <div class="history-command-shelf" data-label="操作">
            <button type="submit">分析目录</button>
            <button id="enrichHistoryButton" class="secondary-button" type="button">语义增强</button>
            <button id="refreshAuthorIntelligenceButton" class="secondary-button" type="button">作者情报</button>
          </div>
        </form>
        <div id="authorIntelligenceResult" class="result-grid"></div>
        <div id="historyResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="contextView">
        <form id="contextForm" class="stacked-form entry-card context-entry-card" data-title="语境还原">
          <div class="control-strip context-source-strip">
            <label>
              <span>论坛</span>
              <select name="forum" id="contextForum"></select>
            </label>
            <label class="grow">
              <span>保存页目录</span>
              <input name="inputDir" value="example" autocomplete="off">
            </label>
          </div>
          <div class="control-strip context-author-strip">
            <label>
              <span>作者 ID</span>
              <input name="authorId" value="150058" autocomplete="off">
            </label>
            <label>
              <span>作者</span>
              <input name="author" value="-阿狼-" autocomplete="off">
            </label>
          </div>
          <label class="full context-text-field">
            <span>新发言</span>
            <textarea name="text" rows="4">科技后面看量确认</textarea>
          </label>
          <div class="context-command-shelf" data-label="还原">
            <button type="submit">还原语境</button>
          </div>
        </form>
        <div id="contextResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="searchView">
        <div class="search-workbench">
          <form id="indexForm" class="control-strip entry-card search-index-card" data-title="索引更新">
            <div class="search-card-kicker">
              <span>资料库</span>
              <strong>本地页面</strong>
            </div>
            <label>
              <span>论坛</span>
              <select name="forum" id="searchForum"></select>
            </label>
            <label class="grow">
              <span>保存页目录</span>
              <input name="inputDir" value="example" autocomplete="off">
            </label>
            <div class="search-command-shelf" data-label="索引">
              <button type="submit">更新索引</button>
              <span>raw → searchable</span>
            </div>
          </form>
          <form id="searchForm" class="control-strip entry-card search-query-card" data-title="证据检索">
            <div class="search-card-kicker">
              <span>召回</span>
              <strong>楼层证据</strong>
            </div>
            <label class="grow search-query-input">
              <span>检索问题</span>
              <input name="text" value="科技" autocomplete="off">
            </label>
            <div class="search-query-side">
              <label class="compact">
                <span>结果数</span>
                <input name="limit" value="8" inputmode="numeric" autocomplete="off">
              </label>
              <button type="submit">搜索证据</button>
            </div>
            <div class="search-hit-schema" aria-hidden="true">
              <span>楼层</span>
              <span>作者</span>
              <span>相关度</span>
            </div>
          </form>
        </div>
        <div id="searchResult" class="result-grid"></div>
      </section>

      <section class="view-panel hidden" id="sourcesView">
        <div class="collection-workflow">
        <form id="taskForm" class="control-strip collection-card collection-card-archive" data-title="资料导入">
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <button type="submit">运行导入任务</button>
          <button id="refreshTasksButton" class="secondary-button" type="button">刷新任务</button>
        </form>
        <form id="sourceForm" class="control-strip collection-card collection-card-source" data-title="跟踪来源">
          <label>
            <span>论坛</span>
            <select name="forum" id="sourceForum"></select>
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA sample archive" autocomplete="off">
          </label>
          <label class="grow">
            <span>保存页目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存来源</button>
          <div class="source-command-shelf" aria-label="来源操作">
            <div class="source-command-group" data-label="来源">
              <button id="refreshSourcesButton" class="secondary-button" type="button">刷新来源</button>
              <button id="refreshSourceOperationsButton" class="secondary-button" type="button">来源概览</button>
              <button id="runDemoCycleButton" class="secondary-button" type="button">试跑闭环</button>
            </div>
          </div>
        </form>
        <form id="threadUrlForm" class="control-strip collection-card collection-card-url" data-title="在线主题">
          <label>
            <span>论坛</span>
            <select name="forum" id="threadUrlForum"></select>
          </label>
          <label class="grow">
            <span>在线主题 URL</span>
            <input name="url" placeholder="https://bbs.nga.cn/read.php?tid=..." autocomplete="off">
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="NGA online thread" autocomplete="off">
          </label>
          <label class="compact">
            <span>间隔分钟</span>
            <input name="intervalMinutes" value="60" inputmode="numeric" autocomplete="off">
          </label>
          <label class="compact">
            <span>起始页</span>
            <input name="startPage" value="1" inputmode="numeric" autocomplete="off">
          </label>
          <label class="compact">
            <span>页数</span>
            <input name="pageCount" value="1" inputmode="numeric" autocomplete="off">
          </label>
          <button type="submit">保存 URL 来源</button>
          <button id="crawlUrlButton" class="secondary-button" type="button">抓取页面</button>
          <button id="refreshRawPagesButton" class="secondary-button" type="button">刷新原始页</button>
        </form>
        <form id="sourceOnboardingForm" class="control-strip collection-card collection-card-onboarding" data-title="接入预检">
          <label>
            <span>接入论坛</span>
            <input name="forum" id="onboardingForum" list="forumSuggestions" value="nga" autocomplete="off">
          </label>
          <label>
            <span>来源类型</span>
            <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
          </label>
          <label class="grow">
            <span>来源名称</span>
            <input name="displayName" value="Onboarding source" autocomplete="off">
          </label>
          <label class="grow">
            <span>可选模块路径</span>
            <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
          </label>
          <button id="loadConnectorModuleCatalogButton" class="secondary-button" type="button">加载模块目录</button>
          <label class="grow">
            <span>本地目录</span>
            <input name="inputDir" value="example" autocomplete="off">
          </label>
          <label class="grow">
            <span>JSON 文件 / URL</span>
            <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
          </label>
          <label class="full">
            <span>位置 JSON</span>
            <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
          </label>
          <button type="submit">接入预检</button>
        </form>
        </div>
        <div class="result-grid task-grid" id="sourceOnboardingRecipe"></div>
        <div class="result-grid task-grid" id="onboardingResult"></div>
        <div class="result-grid task-grid" id="sourceResult"></div>
        <div class="result-grid task-grid" id="rawPageResult"></div>
        <div class="result-grid task-grid" id="taskResult"></div>
      </section>

      <section class="view-panel hidden" id="operationsView">
        <div class="control-strip ops-command-strip" aria-label="运行操作">
          <div class="source-command-shelf">
            <div class="source-command-group" data-label="自动运行">
              <button id="refreshAutomationReadinessButton" class="secondary-button" type="button">运行准备</button>
              <button id="runSourcesButton" class="secondary-button" type="button">运行全部</button>
              <button id="runDueSourcesButton" class="secondary-button" type="button">运行到期</button>
              <button id="runDuePipelinesButton" class="secondary-button" type="button">洞察到期</button>
            </div>
            <div class="source-command-group" data-label="智能助手">
              <button id="runLlmReadinessButton" class="secondary-button" type="button">助手状态</button>
              <button id="runLlmPreflightButton" class="secondary-button" type="button">助手预检</button>
              <button id="runLlmEvaluationButton" class="secondary-button" type="button">质量评估</button>
            </div>
          </div>
        </div>
        <div class="result-grid task-grid automation-cockpit-grid" id="automationReadinessResult"></div>
        <div class="result-grid task-grid automation-action-grid" id="automationActionResult"></div>
        <div class="status-list system-status-grid" id="systemStatus"></div>
        <div class="result-grid task-grid system-runbook-grid" id="runbookResult"></div>
        <div class="result-grid task-grid" id="sourceOperationsResult"></div>
        <div class="result-grid task-grid" id="sourceOperationActionResult"></div>
      </section>

      <section class="view-panel hidden" id="alertsView">
        <div class="event-review-workflow">
        <form id="eventFilterForm" class="control-strip event-card event-card-filter" data-title="提醒筛选">
          <label class="compact">
            <span>事件范围</span>
            <select name="acknowledged">
              <option value="false">未确认</option>
              <option value="">全部</option>
              <option value="true">已确认</option>
            </select>
          </label>
          <label class="compact">
            <span>投递状态</span>
            <select name="deliveryStatus">
              <option value="">全部</option>
              <option value="pending">pending</option>
              <option value="failed">failed</option>
              <option value="delivered">delivered</option>
              <option value="resolved">resolved</option>
            </select>
          </label>
          <label class="compact">
            <span>事件类型</span>
            <select name="type">
              <option value="">全部</option>
              <option value="author-review-queue">author-review-queue</option>
              <option value="context-review-result">context-review-result</option>
              <option value="runbook-action">runbook-action</option>
              <option value="source-attention">source-attention</option>
              <option value="source-type-operations">source-type-operations</option>
              <option value="source-changed">source-changed</option>
            </select>
          </label>
          <label class="compact">
            <span>来源代号</span>
            <input name="sourceKey" placeholder="nga" autocomplete="off">
          </label>
          <label class="compact">
            <span>来源 ID</span>
            <input name="sourceId" placeholder="source-1" autocomplete="off">
          </label>
          <label class="compact">
            <span>数量</span>
            <input name="limit" value="10" inputmode="numeric" autocomplete="off">
          </label>
          <div class="event-triage-command-shelf" aria-label="提醒筛选操作">
            <div class="event-triage-command-group event-triage-query" data-label="筛选">
              <button type="submit">筛选事件</button>
            </div>
            <div class="event-triage-command-group" data-label="事件">
              <button type="button" class="secondary-button" id="refreshEventsButton">刷新事件</button>
              <button type="button" class="secondary-button" id="dispatchEventsButton">投递事件</button>
            </div>
            <div class="event-triage-command-group" data-label="确认">
              <button type="button" class="secondary-button" id="previewAckEventsButton">预览确认</button>
              <button type="button" class="secondary-button" id="ackVisibleEventsButton">确认所选</button>
            </div>
            <div class="event-triage-command-group" data-label="归档">
              <button type="button" class="secondary-button" id="previewEventArchiveButton">归档检查</button>
              <button type="button" class="secondary-button" id="archiveEventsButton">归档已处理</button>
            </div>
          </div>
        </form>
        <form id="contextReviewResultForm" class="control-strip event-card event-card-review" data-title="人工复核">
          <label class="full">
            <span>复核结果 JSON</span>
            <textarea name="resultJson" rows="10" spellcheck="false">{
  "version": "1.0.0",
  "handoffVersion": "1.0.0",
  "handoffId": "context-review-web-sample",
  "status": "partially-accepted",
  "reviewer": {
    "type": "human",
    "id": "web-operator",
    "displayName": "Web operator"
  },
  "reviewedAt": "2026-06-21T10:00:00.000Z",
  "decisions": [
    {
      "taskId": "web-review-task-1",
      "decision": "confirmed",
      "confidence": 0.82,
      "evidenceRefs": []
    },
    {
      "taskId": "web-review-task-2",
      "decision": "needs-more-evidence",
      "confidence": 0.52,
      "evidenceRefs": []
    }
  ],
  "resolvedTasks": ["web-review-task-1"],
  "remainingTasks": ["web-review-task-2"],
  "confidence": 0.7,
  "evidenceRefs": []
}</textarea>
          </label>
          <div class="review-command-shelf" aria-label="复核操作">
            <div class="review-command-group review-command-primary" data-label="决策">
              <button type="submit">保存复核结果</button>
              <button id="refreshReviewResultsButton" class="secondary-button" type="button">复核概览</button>
            </div>
            <div class="review-command-group" data-label="计划">
              <button id="refreshReviewActionPlanButton" class="secondary-button" type="button">后续计划</button>
              <button id="refreshReviewActionGateButton" class="secondary-button" type="button">合并检查</button>
              <button id="runReviewActionApplyButton" class="secondary-button" type="button">预演应用</button>
            </div>
            <div class="review-command-group" data-label="审计">
              <button id="refreshReviewActionAuditsButton" class="secondary-button" type="button">复核审计</button>
              <button id="refreshReviewActionExecutionsButton" class="secondary-button" type="button">执行记录</button>
              <button id="refreshReviewActionExecutorDiagnosticsButton" class="secondary-button" type="button">执行诊断</button>
            </div>
            <div class="review-command-group" data-label="提醒">
              <button id="synthesizeReviewResultEventsButton" class="secondary-button" type="button">提醒预览</button>
              <button id="createReviewResultEventsButton" class="secondary-button" type="button">创建复核提醒</button>
            </div>
          </div>
        </form>
        </div>
        <div class="result-grid task-grid" id="eventResult"></div>
        <div class="result-grid task-grid" id="contextReviewResultOverview"></div>
        <div class="result-grid task-grid" id="contextReviewResultResult"></div>
      </section>

      <section class="view-panel hidden" id="publishView">
        <div class="rollout-workbench">
          <section class="rollout-stage rollout-stage-intake">
            <div class="rollout-stage-head">
              <strong>接入入口</strong>
            </div>
            <form id="connectorModuleValidationForm" class="control-strip rollout-card rollout-card-module" data-title="模块扫描">
              <label class="grow">
                <span>Connector 模块路径</span>
                <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
              </label>
              <div class="rollout-command-shelf" data-label="模块">
                <button type="submit">验证模块</button>
              </div>
            </form>
            <form id="sourceDryRunForm" class="control-strip rollout-card rollout-card-dryrun" data-title="来源试跑">
              <label>
                <span>试跑论坛</span>
                <input name="forum" id="dryRunForum" list="forumSuggestions" value="nga" autocomplete="off">
              </label>
              <label>
                <span>来源类型</span>
                <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
              </label>
              <label class="grow">
                <span>名称</span>
                <input name="displayName" value="Dry-run source" autocomplete="off">
              </label>
              <label class="grow">
                <span>模块路径</span>
                <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
              </label>
              <label class="grow">
                <span>本地目录</span>
                <input name="inputDir" value="example" autocomplete="off">
              </label>
              <label class="grow">
                <span>JSON 文件 / URL</span>
                <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
              </label>
              <label class="full rollout-json-field">
                <span>位置 JSON</span>
                <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
              </label>
              <div class="rollout-command-shelf" data-label="试跑">
                <button type="submit">来源试跑</button>
              </div>
            </form>
            <form id="connectorRolloutForm" class="control-strip rollout-card rollout-card-plan" data-title="发布路径">
              <label>
                <span>发布论坛</span>
                <input name="forum" id="rolloutForum" list="forumSuggestions" value="nga" autocomplete="off">
              </label>
              <label>
                <span>来源类型</span>
                <input name="sourceType" list="sourceTypeSuggestions" value="saved-html-directory" autocomplete="off">
              </label>
              <label class="grow">
                <span>名称</span>
                <input name="displayName" value="Rollout source" autocomplete="off">
              </label>
              <label class="grow">
                <span>模块路径</span>
                <input name="modulePath" placeholder="D:/connectors/custom-forum.cjs" autocomplete="off">
              </label>
              <label class="grow">
                <span>本地目录</span>
                <input name="inputDir" value="example" autocomplete="off">
              </label>
              <label class="grow">
                <span>JSON 文件 / URL</span>
                <input name="locationValue" placeholder="D:/feeds/thread.json or https://..." autocomplete="off">
              </label>
              <label class="compact">
                <span>预演</span>
                <select name="dryRunIngest">
                  <option value="true">true</option>
                  <option value="false">false</option>
                </select>
              </label>
              <label class="full rollout-json-field">
                <span>位置 JSON</span>
                <textarea name="locationJson" rows="3" placeholder='{"feedUrl":"https://example.test/feed"}'></textarea>
              </label>
              <div class="rollout-command-shelf" data-label="路径">
                <button type="submit">发布计划</button>
              </div>
            </form>
          </section>
          <section class="rollout-stage rollout-stage-runtime">
            <div class="rollout-stage-head">
              <strong>执行路径</strong>
            </div>
            <form id="workerTopologyForm" class="control-strip rollout-card rollout-card-worker" data-title="执行拓扑">
              <label>
                <span>拓扑</span>
                <select name="topology">
                  <option value="operations-worker">operations-worker</option>
                  <option value="split-workers">split-workers</option>
                </select>
              </label>
              <label>
                <span>来源模式</span>
                <select name="sourceTaskMode">
                  <option value="ingest">ingest</option>
                  <option value="insight-pipeline">insight-pipeline</option>
                </select>
              </label>
              <label>
                <span>来源代号</span>
                <input name="sourceKey" value="nga" autocomplete="off">
              </label>
              <label>
                <span>来源 ID</span>
                <input name="sourceId" placeholder="optional tracked source id" autocomplete="off">
              </label>
              <div class="rollout-command-shelf" data-label="执行">
                <button type="submit">执行计划</button>
              </div>
            </form>
          </section>
          <section class="rollout-stage rollout-stage-manifest">
            <div class="rollout-stage-head">
              <strong>清单检查</strong>
            </div>
            <form id="rolloutManifestForm" class="control-strip rollout-card rollout-card-manifest" data-title="发布清单">
              <label class="full rollout-json-field">
                <span>发布清单 JSON</span>
